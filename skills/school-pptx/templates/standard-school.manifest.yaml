theme_id: standard-school
available_themes:
  - standard-school
template:
  path: standard-school.pptx
  format: pptx
  source_evidence: test/canonical-待UAT-第七版.pptx
  mapping_strategy: renderer-owned-native-shapes
  seed_slides: 26
  seed_notes_relationships: 26
  geometry_units: emu
  geometry_tolerance_emu: 2000
ownership:
  geometry: template-owned
  fonts: template-owned
  colors: template-owned
  decorative_assets: template-owned
  footer_behavior: template-owned
  bounded_text_behavior: template-owned
  markdown_controls:
    - semantic content only
  markdown_cannot_override:
    - geometry
    - fonts
    - colors
    - decorative assets
    - footer behavior
    - bounded text behavior
inline_styles:
  highlight:
    scheme_color: accent1
required_layouts:
  - cover
  - contents
  - section
  - title-content
  - two-column
  - image-text
  - table
  - timeline
  - gallery
  - code
  - closing
