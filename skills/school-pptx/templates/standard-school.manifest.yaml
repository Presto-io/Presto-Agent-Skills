theme_id: standard-school
available_themes:
  - standard-school
template:
  path: standard-school.pptx
  format: pptx
  source_evidence: test/学院PPT模板.potx
  mapping_strategy: native-slide-layout-xml
  geometry_units: emu
  geometry_tolerance_emu: 2000
ownership:
  geometry: template-owned
  fonts: template-owned
  colors: template-owned
  decorative_assets: template-owned
  footer_behavior: template-owned
  bounded_text_behavior: template-owned
  markdown_controls:
    - semantic content only
  markdown_cannot_override:
    - geometry
    - fonts
    - colors
    - decorative assets
    - footer behavior
    - bounded text behavior
inline_styles:
  highlight:
    scheme_color: accent6
required_layouts:
  - cover
  - contents
  - section
  - title-content
  - two-column
  - image-text
  - table
  - timeline
  - gallery
  - code
  - closing
layouts:
